name: release
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # git describe needs tags on workflow_dispatch runs
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace
      # Dependency order. Idempotent: versions already on crates.io are
      # skipped, so a partially-failed release can be re-run safely.
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          for crate in clarify-bq-client clarify-bq-sink clarify-bq; do
            version=$(cargo metadata --format-version 1 --no-deps \
              | jq -r ".packages[] | select(.name == \"$crate\") | .version")
            if curl -sfA "release-ci (github.com/moesy/clarify-bq)" \
                "https://crates.io/api/v1/crates/$crate/$version" >/dev/null 2>&1; then
              echo "$crate $version already published; skipping"
            else
              cargo publish -p "$crate"
            fi
          done
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME:-}"
          if [ "${GITHUB_REF_TYPE:-}" != "tag" ]; then
            tag=$(git describe --tags --abbrev=0)
          fi
          gh release view "$tag" >/dev/null 2>&1 \
            || gh release create "$tag" --title "$tag" --generate-notes
